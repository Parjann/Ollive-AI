apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-observability-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-observability-app
  template:
    metadata:
      labels:
        app: ai-observability-app
    spec:
      containers:
        - name: ai-observability-app
          image: ai-observability-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: DATABASE_URL
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: GROQ_API_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: GEMINI_API_KEY
