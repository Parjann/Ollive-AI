version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15-alpine
    container_name: ollive-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ollive_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ollive_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Next.js Web Application Service
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollive-web
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Database connection string pointing to the compose database service container name
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/ollive_ai?schema=public"
      # Forwards local environment API keys dynamically from host environment/shell env
      GROQ_API_KEY: "${GROQ_API_KEY}"
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
